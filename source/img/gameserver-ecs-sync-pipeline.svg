<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">GameServer ECS 增量同步完整链路</title>
  <desc id="desc">服务器的 EntityStore 事件和显式组件更新进入 EcsDirtyTracker 合并，RoomSyncSystem 在 Tick 结束时向已有客户端发送 Diff、向待同步连接发送 FullState；客户端先校验再按固定顺序应用，失败时请求重同步。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .lane { fill: #ffffff; stroke: #d6dee9; stroke-width: 2; rx: 16; }
      .server { fill: #eef6ff; stroke: #2563eb; stroke-width: 1.8; rx: 11; }
      .tracker { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.8; rx: 11; }
      .sync { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.8; rx: 11; }
      .client { fill: #e8f7ef; stroke: #22a06b; stroke-width: 1.8; rx: 11; }
      .neutral { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; rx: 9; }
      .message { fill: #ffffff; stroke: #7c3aed; stroke-width: 1.5; rx: 20; }
      .label { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small-label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .text { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .muted { font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
      .mono { font: 500 13px "SFMono-Regular", Consolas, monospace; fill: #1f2937; }
      .arrow { stroke: #64748b; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .back { stroke: #d97706; stroke-width: 2.1; fill: none; marker-end: url(#arrow-orange); stroke-dasharray: 8 6; }
      .divider { stroke: #d6dee9; stroke-width: 1.5; stroke-dasharray: 6 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748b" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#d97706" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="820" />
  <text class="title" x="50" y="58">GameServer ECS 增量同步完整链路</text>
  <text class="subtitle" x="50" y="88">服务器收集并合并变化；客户端先验证整份数据，再一次性提交新状态。</text>

  <rect class="lane" x="50" y="120" width="1100" height="344" />
  <text class="label" x="78" y="158">Server</text>
  <line class="divider" x1="78" y1="178" x2="1122" y2="178" />

  <rect class="server" x="82" y="212" width="226" height="96" />
  <text class="small-label" x="104" y="240">EntityStore</text>
  <text class="text" x="104" y="266">Create / Delete / Add / Remove</text>
  <text class="text" x="104" y="288">Parent 关系变化事件</text>

  <rect class="server" x="82" y="330" width="226" height="88" />
  <text class="small-label" x="104" y="358">业务代码</text>
  <text class="mono" x="104" y="382">SetReplicatedComponent</text>
  <text class="text" x="104" y="402">更新组件并显式标脏</text>

  <rect class="tracker" x="376" y="238" width="236" height="144" />
  <text class="small-label" x="398" y="268">EcsDirtyTracker</text>
  <text class="text" x="398" y="294">按 EntityId / 组件 key 合并</text>
  <text class="text" x="398" y="318">Sequence 保留有效顺序</text>
  <rect class="neutral" x="398" y="336" width="192" height="28" />
  <text class="mono" x="414" y="355">Flush() → final changes</text>

  <rect class="sync" x="680" y="224" width="240" height="174" />
  <text class="small-label" x="702" y="254">RoomSyncSystem</text>
  <text class="text" x="702" y="280">Tick 结束：先 FlushDiff</text>
  <text class="text" x="702" y="302">再 FlushFullState</text>
  <rect class="neutral" x="702" y="322" width="196" height="54" />
  <text class="mono" x="718" y="344">Source = R</text>
  <text class="mono" x="718" y="365">Target = R + 1</text>

  <rect class="neutral" x="982" y="204" width="140" height="82" />
  <text class="small-label" x="1002" y="232">已有基线</text>
  <text class="text" x="1002" y="258">接收当前 Diff</text>
  <rect class="neutral" x="982" y="326" width="140" height="92" />
  <text class="small-label" x="1002" y="354">Pending</text>
  <text class="text" x="1002" y="378">跳过当前 Diff</text>
  <text class="text" x="1002" y="400">接收 FullState</text>

  <path class="arrow" d="M308 260 C338 260 346 278 376 278" />
  <path class="arrow" d="M308 374 C338 374 346 342 376 342" />
  <path class="arrow" d="M612 310 L680 310" />
  <path class="arrow" d="M920 266 C946 266 952 245 982 245" />
  <path class="arrow" d="M920 350 C946 350 952 372 982 372" />

  <rect class="message" x="954" y="454" width="178" height="42" />
  <text class="mono" x="976" y="480">RoomDiffStatePush</text>
  <rect class="message" x="708" y="454" width="190" height="42" />
  <text class="mono" x="730" y="480">RoomFullStatePush</text>
  <path class="arrow" d="M1052 286 L1052 454" />
  <path class="arrow" d="M1052 418 C1052 444 900 442 826 454" />

  <rect class="lane" x="50" y="526" width="1100" height="244" />
  <text class="label" x="78" y="564">Client · ReplicatedEcsWorld</text>
  <line class="divider" x1="78" y1="584" x2="1122" y2="584" />

  <rect class="client" x="82" y="616" width="246" height="112" />
  <text class="small-label" x="104" y="644">1. 校验整份消息</text>
  <text class="text" x="104" y="668">revision、EntityId、TypeId</text>
  <text class="text" x="104" y="690">组件状态、引用关系、环</text>
  <text class="muted" x="104" y="712">失败时不修改当前世界</text>

  <rect class="client" x="430" y="616" width="304" height="112" />
  <text class="small-label" x="452" y="644">2. 按固定顺序应用</text>
  <text class="mono" x="452" y="672">Create Entity → Component</text>
  <text class="mono" x="452" y="696">→ Reparent → Delete Entity</text>

  <rect class="client" x="836" y="616" width="246" height="112" />
  <text class="small-label" x="858" y="644">3. 提交状态</text>
  <text class="text" x="858" y="672">成功：更新 WorldRevision</text>
  <text class="text" x="858" y="696">FullState：替换旧 EntityStore</text>

  <path class="arrow" d="M954 496 C900 544 476 562 286 616" />
  <path class="arrow" d="M798 496 C696 536 356 560 238 616" />
  <path class="arrow" d="M328 672 L430 672" />
  <path class="arrow" d="M734 672 L836 672" />

  <path class="back" d="M82 704 C18 704 22 476 82 374" />
  <rect class="message" x="54" y="468" width="184" height="42" />
  <text class="mono" x="78" y="494">RoomResyncReq</text>
  <text class="muted" x="248" y="495">校验失败 / revision 断档</text>
</svg>
