<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Capability 生命周期</title>
  <desc id="desc">Capability 从 Setup 注册开始，在 Inactive 和 Active 两种状态之间切换，并在 Owner 销毁时清理和反注册。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .setup { fill: #e0f2fe; stroke: #0284c7; }
      .inactive { fill: #f1f5f9; stroke: #475569; }
      .active { fill: #dcfce7; stroke: #16a34a; }
      .event { fill: #fef3c7; stroke: #d97706; }
      .destroy { fill: #fee2e2; stroke: #dc2626; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #64748b; stroke-width: 1.8; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="460"/>
  <text class="title" x="40" y="44">Capability 生命周期</text>
  <text class="small" x="40" y="70">Inactive 时只检查进入条件，Active 时检查退出条件并执行 TickActive。</text>

  <rect class="box setup" x="55" y="164" width="150" height="86" rx="10"/>
  <text class="label" x="130" y="196" text-anchor="middle">Setup</text>
  <text class="mono" x="130" y="222" text-anchor="middle">Register</text>
  <text class="small" x="130" y="242" text-anchor="middle">绑定 Owner / Holder</text>

  <rect class="box inactive" x="270" y="164" width="170" height="86" rx="10"/>
  <text class="label" x="355" y="196" text-anchor="middle">Inactive</text>
  <text class="mono" x="355" y="222" text-anchor="middle">ShouldActivate</text>
  <text class="small" x="355" y="242" text-anchor="middle">deActiveDuration 增加</text>

  <rect class="box event" x="505" y="164" width="150" height="86" rx="10"/>
  <text class="label" x="580" y="196" text-anchor="middle">OnActivated</text>
  <text class="small" x="580" y="222" text-anchor="middle">一次性进入逻辑</text>

  <rect class="box active" x="720" y="144" width="190" height="126" rx="10"/>
  <text class="label" x="815" y="180" text-anchor="middle">Active</text>
  <text class="mono" x="815" y="207" text-anchor="middle">TickActive</text>
  <text class="mono" x="815" y="229" text-anchor="middle">ShouldDeactivate</text>
  <text class="small" x="815" y="250" text-anchor="middle">activeDuration 增加</text>

  <rect class="box event" x="975" y="164" width="160" height="86" rx="10"/>
  <text class="label" x="1055" y="196" text-anchor="middle">OnDeactivated</text>
  <text class="small" x="1055" y="222" text-anchor="middle">清理状态</text>
  <text class="small" x="1055" y="242" text-anchor="middle">解除阻塞</text>

  <path class="arrow" d="M 208 207 L 262 207"/>
  <path class="arrow" d="M 443 207 L 497 207"/>
  <text class="small" x="470" y="193" text-anchor="middle">true</text>
  <path class="arrow" d="M 658 207 L 712 207"/>
  <path class="arrow" d="M 913 207 L 967 207"/>
  <text class="small" x="940" y="193" text-anchor="middle">true</text>

  <path class="loop" d="M 360 160 C 360 105 285 105 285 160"/>
  <text class="small" x="320" y="115" text-anchor="middle">每帧检查进入</text>

  <path class="loop" d="M 815 138 C 815 90 735 90 735 138"/>
  <text class="small" x="775" y="102" text-anchor="middle">每帧运行</text>

  <path class="arrow" d="M 1055 253 C 1055 340 355 340 355 258"/>
  <text class="small" x="700" y="360" text-anchor="middle">退出后回到 Inactive</text>

  <rect class="box destroy" x="470" y="372" width="260" height="52" rx="8"/>
  <text class="label" x="600" y="404" text-anchor="middle">OwnerDestroyed: active 时先 OnDeactivated，再 Unregister</text>
  <path class="arrow" d="M 815 274 C 815 330 710 360 660 370"/>
</svg>
