<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Capability 资产装配</title>
  <desc id="desc">CapabilityAsset、ComponentAsset、ConfigAsset 声明依赖，初始化流程展开后写入 Holder，并调用 Setup 注册能力。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .asset { fill: #ede9fe; stroke: #7c3aed; }
      .init { fill: #e0f2fe; stroke: #0284c7; }
      .holder { fill: #f1f5f9; stroke: #475569; stroke-width: 1.8; }
      .system { fill: #dcfce7; stroke: #16a34a; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="500"/>
  <text class="title" x="40" y="44">Capability 资产装配</text>
  <text class="small" x="40" y="70">资产层声明依赖，初始化流程负责展开。运行时系统只接收已经创建好的能力实例。</text>

  <rect class="box asset" x="50" y="130" width="230" height="72" rx="10"/>
  <text class="label" x="165" y="160" text-anchor="middle">CapabilityAsset</text>
  <text class="mono" x="165" y="184" text-anchor="middle">GetDependencies()</text>

  <rect class="box asset" x="50" y="225" width="230" height="72" rx="10"/>
  <text class="label" x="165" y="255" text-anchor="middle">ComponentAsset</text>
  <text class="mono" x="165" y="279" text-anchor="middle">GetDependencies()</text>

  <rect class="box asset" x="50" y="320" width="230" height="72" rx="10"/>
  <text class="label" x="165" y="350" text-anchor="middle">ConfigAsset</text>
  <text class="mono" x="165" y="374" text-anchor="middle">GetDependencies()</text>

  <rect class="box init" x="380" y="190" width="230" height="118" rx="12"/>
  <text class="label" x="495" y="226" text-anchor="middle">初始化流程</text>
  <text class="small" x="495" y="252" text-anchor="middle">展开 Asset 或 Sheet</text>
  <text class="small" x="495" y="274" text-anchor="middle">创建能力、组件、配置实例</text>

  <rect class="box holder" x="710" y="125" width="230" height="250" rx="12"/>
  <text class="label" x="825" y="160" text-anchor="middle">Holder</text>
  <text class="mono" x="825" y="195" text-anchor="middle">capabilities[]</text>
  <text class="mono" x="825" y="225" text-anchor="middle">components[]</text>
  <text class="mono" x="825" y="255" text-anchor="middle">configs[]</text>
  <text class="mono" x="825" y="285" text-anchor="middle">tagBlockers</text>
  <text class="small" x="825" y="330" text-anchor="middle">对每个 Capability 调用 Setup</text>

  <rect class="box system" x="1010" y="190" width="150" height="118" rx="12"/>
  <text class="label" x="1085" y="226" text-anchor="middle">System</text>
  <text class="mono" x="1085" y="252" text-anchor="middle">Register</text>
  <text class="small" x="1085" y="276" text-anchor="middle">进入 Tick 队列</text>

  <path class="arrow" d="M 285 166 L 372 220"/>
  <path class="arrow" d="M 285 261 L 372 249"/>
  <path class="arrow" d="M 285 356 L 372 278"/>
  <path class="arrow" d="M 615 249 L 702 249"/>
  <path class="arrow" d="M 945 249 L 1002 249"/>

  <rect class="box" x="380" y="365" width="560" height="56" rx="8"/>
  <text class="label" x="660" y="397" text-anchor="middle">Sheet 是更高一层的组合概念，本质上还是收集这些 Asset 或依赖列表。</text>
</svg>
