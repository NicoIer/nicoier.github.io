<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">游戏开发中的代码生成总览</title>
  <desc id="desc">三条代码生成链路：C# 类型通过 Source Generator 生成编译期代码，工程定义通过 Code Generator 生成落盘代码，Excel 和 Schema 通过 Luban 生成强类型配置与客户端服务器数据。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .source { fill: #f1f5f9; stroke: #64748b; stroke-width: 1.5; }
      .roslyn { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.8; }
      .codegen { fill: #ede9fe; stroke: #7c3aed; stroke-width: 1.8; }
      .luban { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.8; }
      .output { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .runtime { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .lane-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .text { font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .mono { font: 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>
  <text class="title" x="42" y="50">游戏开发中的代码生成</text>
  <text class="subtitle" x="42" y="78">三种工具都在减少重复维护，但输入、触发时机和生成物所有权不同。</text>

  <rect class="panel" x="36" y="108" width="1128" height="164" rx="12"/>
  <text class="lane-title" x="58" y="139">Source Generator：随编译生成</text>

  <rect class="source" x="70" y="166" width="220" height="72" rx="9"/>
  <text class="label" x="180" y="194" text-anchor="middle">C# 类型与 Attribute</text>
  <text class="small" x="180" y="218" text-anchor="middle">Component / Request / Logic</text>

  <rect class="roslyn" x="385" y="166" width="220" height="72" rx="9"/>
  <text class="label" x="495" y="194" text-anchor="middle">Source Generator</text>
  <text class="small" x="495" y="218" text-anchor="middle">编译期分析 + Diagnostic</text>

  <rect class="output" x="700" y="156" width="230" height="92" rx="9"/>
  <text class="label" x="815" y="184" text-anchor="middle">Compilation 中的代码</text>
  <text class="small" x="815" y="208" text-anchor="middle">序列化 / Handler 接口</text>
  <text class="small" x="815" y="229" text-anchor="middle">Registry / 集中注册</text>

  <rect class="runtime" x="988" y="166" width="140" height="72" rx="9"/>
  <text class="label" x="1058" y="194" text-anchor="middle">运行时</text>
  <text class="small" x="1058" y="218" text-anchor="middle">直接调用，无需扫描</text>

  <path class="arrow" d="M 292 202 L 375 202"/>
  <path class="arrow" d="M 607 202 L 690 202"/>
  <path class="arrow" d="M 932 202 L 978 202"/>
  <text class="small" x="650" y="188" text-anchor="middle">同一次编译</text>

  <rect class="panel" x="36" y="292" width="1128" height="164" rx="12"/>
  <text class="lane-title" x="58" y="323">Code Generator：显式生成工程文件</text>

  <rect class="source" x="70" y="350" width="220" height="72" rx="9"/>
  <text class="label" x="180" y="378" text-anchor="middle">工程定义</text>
  <text class="small" x="180" y="402" text-anchor="middle">源码 / Schema / 生成枚举</text>

  <rect class="codegen" x="385" y="350" width="220" height="72" rx="9"/>
  <text class="label" x="495" y="378" text-anchor="middle">Code Generator</text>
  <text class="small" x="495" y="402" text-anchor="middle">命令行 / 构建脚本 / CI</text>

  <rect class="output" x="700" y="340" width="230" height="92" rx="9"/>
  <text class="label" x="815" y="368" text-anchor="middle">落盘的 .cs 文件</text>
  <text class="small" x="815" y="392" text-anchor="middle">RPC 封装 / 多端注册</text>
  <text class="small" x="815" y="413" text-anchor="middle">只创建一次的业务骨架</text>

  <rect class="runtime" x="988" y="350" width="140" height="72" rx="9"/>
  <text class="label" x="1058" y="378" text-anchor="middle">多个工程</text>
  <text class="small" x="1058" y="402" text-anchor="middle">Server + Unity</text>

  <path class="arrow" d="M 292 386 L 375 386"/>
  <path class="arrow" d="M 607 386 L 690 386"/>
  <path class="arrow" d="M 932 386 L 978 386"/>
  <text class="small" x="650" y="372" text-anchor="middle">写入目录</text>

  <rect class="panel" x="36" y="476" width="1128" height="164" rx="12"/>
  <text class="lane-title" x="58" y="507">Luban：生产强类型游戏配置</text>

  <rect class="source" x="70" y="534" width="220" height="72" rx="9"/>
  <text class="label" x="180" y="562" text-anchor="middle">Excel 与 Schema</text>
  <text class="small" x="180" y="586" text-anchor="middle">Table / Bean / Enum / Group</text>

  <rect class="luban" x="385" y="534" width="220" height="72" rx="9"/>
  <text class="label" x="495" y="562" text-anchor="middle">Luban</text>
  <text class="small" x="495" y="586" text-anchor="middle">检查、生成与分组导出</text>

  <rect class="output" x="700" y="524" width="230" height="92" rx="9"/>
  <text class="label" x="815" y="552" text-anchor="middle">类型代码 + 配置数据</text>
  <text class="small" x="815" y="576" text-anchor="middle">Tables / Config / Enum</text>
  <text class="small" x="815" y="597" text-anchor="middle">JSON / Binary</text>

  <rect class="runtime" x="988" y="524" width="140" height="92" rx="9"/>
  <text class="label" x="1058" y="552" text-anchor="middle">按目标使用</text>
  <text class="small" x="1058" y="576" text-anchor="middle">Client</text>
  <text class="small" x="1058" y="597" text-anchor="middle">Server / Editor</text>

  <path class="arrow" d="M 292 570 L 375 570"/>
  <path class="arrow" d="M 607 570 L 690 570"/>
  <path class="arrow" d="M 932 570 L 978 570"/>
  <text class="small" x="650" y="556" text-anchor="middle">导表</text>

  <path class="dash" d="M 495 608 L 495 666 L 815 666 L 815 618"/>
  <text class="small" x="655" y="690" text-anchor="middle">GameServer / Game001：共享配置与 RPC　　BeChampion：配置 → 逻辑骨架 → 编译注册</text>
</svg>
