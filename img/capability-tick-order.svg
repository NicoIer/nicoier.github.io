<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Capability Tick 顺序</title>
  <desc id="desc">CapabilitySystem 先按 ETickGroup 的枚举顺序推进，再在同一组里按 tickGroupOrder 升序更新。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .group { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; }
      .head { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.2; }
      .row { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .active { fill: #dcfce7; stroke: #16a34a; stroke-width: 1; }
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1200" height="500"/>
  <text class="title" x="40" y="44">Capability Tick 顺序</text>
  <text class="small" x="40" y="70">先按 TickGroup，再按 tickGroupOrder。顺序是框架层面的契约。</text>

  <g transform="translate(40,125)">
    <rect class="group" x="0" y="0" width="190" height="260" rx="10"/>
    <rect class="head" x="0" y="0" width="190" height="50" rx="10"/>
    <text class="label" x="95" y="31" text-anchor="middle">NetworkEarly</text>
    <rect class="row" x="18" y="75" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="101" text-anchor="middle">order 0</text>
    <rect class="row" x="18" y="132" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="158" text-anchor="middle">order 10</text>
    <rect class="active" x="18" y="189" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="215" text-anchor="middle">order 100</text>
  </g>

  <g transform="translate(270,125)">
    <rect class="group" x="0" y="0" width="190" height="260" rx="10"/>
    <rect class="head" x="0" y="0" width="190" height="50" rx="10"/>
    <text class="label" x="95" y="31" text-anchor="middle">Input</text>
    <rect class="row" x="18" y="75" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="101" text-anchor="middle">order 0</text>
    <rect class="active" x="18" y="132" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="158" text-anchor="middle">order 50</text>
    <rect class="row" x="18" y="189" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="215" text-anchor="middle">order 200</text>
  </g>

  <g transform="translate(500,125)">
    <rect class="group" x="0" y="0" width="190" height="260" rx="10"/>
    <rect class="head" x="0" y="0" width="190" height="50" rx="10"/>
    <text class="label" x="95" y="31" text-anchor="middle">Gameplay</text>
    <rect class="row" x="18" y="75" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="101" text-anchor="middle">order 0</text>
    <rect class="row" x="18" y="132" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="158" text-anchor="middle">order 20</text>
    <rect class="active" x="18" y="189" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="215" text-anchor="middle">order 300</text>
  </g>

  <g transform="translate(730,125)">
    <rect class="group" x="0" y="0" width="190" height="260" rx="10"/>
    <rect class="head" x="0" y="0" width="190" height="50" rx="10"/>
    <text class="label" x="95" y="31" text-anchor="middle">AfterGameplay</text>
    <rect class="row" x="18" y="75" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="101" text-anchor="middle">order 0</text>
    <rect class="active" x="18" y="132" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="158" text-anchor="middle">order 100</text>
    <rect class="row" x="18" y="189" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="215" text-anchor="middle">order 999</text>
  </g>

  <g transform="translate(960,125)">
    <rect class="group" x="0" y="0" width="190" height="260" rx="10"/>
    <rect class="head" x="0" y="0" width="190" height="50" rx="10"/>
    <text class="label" x="95" y="31" text-anchor="middle">NetworkLate</text>
    <rect class="row" x="18" y="75" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="101" text-anchor="middle">order 0</text>
    <rect class="active" x="18" y="132" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="158" text-anchor="middle">order 100</text>
    <rect class="row" x="18" y="189" width="154" height="42" rx="6"/>
    <text class="mono" x="95" y="215" text-anchor="middle">order 200</text>
  </g>

  <path class="arrow" d="M 235 255 L 263 255"/>
  <path class="arrow" d="M 465 255 L 493 255"/>
  <path class="arrow" d="M 695 255 L 723 255"/>
  <path class="arrow" d="M 925 255 L 953 255"/>

  <text class="small" x="600" y="430" text-anchor="middle">同一组内 order 越小越早。跨组顺序由 ETickGroup 枚举顺序决定。</text>
</svg>
